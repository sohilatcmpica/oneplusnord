<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePlus Nord Buds 3r | Bolder. Better. Bass.</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 4s infinite;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #050505;
            color: #e2e8f0;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in browser
        const Icon = ({ name, className = "w-6 h-6", color = "currentColor" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ color }}></i>;
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState({ hours: 23, minutes: 59, seconds: 59 });
            const [activeFaq, setActiveFaq] = useState(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev.seconds > 0) return { ...prev, seconds: prev.seconds - 1 };
                        if (prev.minutes > 0) return { ...prev, minutes: prev.minutes - 1, seconds: 59 };
                        if (prev.hours > 0) return { ...prev, hours: prev.hours - 1, minutes: 59, seconds: 59 };
                        return prev;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const amazonLink = "https://amzn.in/d/00L8dZ8y";

            const features = [
                {
                    title: "54 Hours of Pure Immersion",
                    description: "Our longest battery ever. Get up to 54 hours of total playback with the charging case. Forgot to charge? A quick 10-minute blast gives you 8 hours of listening.",
                    icon: "battery",
                    img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&q=80&w=800"
                },
                {
                    title: "Titanium-Coated Precision",
                    description: "Experience deeper bass and powerful beats. The 12.4mm titanium coating ensures crystal-clear details in every note, from soaring highs to thumping lows.",
                    icon: "music",
                    img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=800"
                }
            ];

            const gridFeatures = [
                { title: "3D Spatial Audio", desc: "Immersive soundscapes for OnePlus users.", icon: "music" },
                { title: "Dual-Device Connection", desc: "Switch seamlessly between laptop and phone.", icon: "smartphone" },
                { title: "47ms Ultra-Low Latency", desc: "Zero lag for a competitive gaming edge.", icon: "gamepad-2" },
                { title: "AI Call Noise Reduction", desc: "2-mic system for crystal clear calls.", icon: "mic-2" },
                { title: "IP55 Water Resistance", desc: "Sweat and rain resistant for active use.", icon: "shield-check" },
                { title: "Flash Charge", desc: "10 mins charge = 8 hours playback.", icon: "zap" },
            ];

            const testimonials = [
                { name: "Rahul S.", rating: 5, text: "The battery life is insane. I haven't charged the case in 10 days and I use it 4 hours daily." },
                { name: "Priya M.", rating: 4, text: "Bass is heavy but clear. Perfect for my gym sessions. The Aura Blue color looks premium." },
                { name: "Anish K.", rating: 5, text: "Switching between my MacBook and phone is flawless. Best TWS at this price point." },
            ];

            const faqs = [
                { q: "Is it compatible with non-OnePlus phones?", a: "Yes! It works with all Android and iOS devices via Bluetooth. Enhanced features like 3D Spatial Audio are optimized for OnePlus devices." },
                { q: "What is the warranty period?", a: "The OnePlus Nord Buds 3r comes with a 1-year limited manufacturer warranty." },
                { q: "How long does it take to full charge?", a: "A full charge takes approximately 120 minutes for both the buds and the case." },
            ];

            return (
                <div className="min-h-screen bg-[#050505] font-sans text-slate-200 overflow-x-hidden selection:bg-red-500/30">
                    {/* Urgency Bar */}
                    <div className="bg-red-600 text-white py-2 px-4 sticky top-0 z-50 flex justify-center items-center gap-4 text-xs md:text-sm font-bold shadow-xl border-b border-red-500/50">
                        <Icon name="clock" className="w-4 h-4 animate-pulse" />
                        <span className="tracking-wider uppercase">Flash Sale Ends In:</span>
                        <span className="bg-black/30 px-3 py-0.5 rounded-full font-mono text-base ring-1 ring-white/20">
                            {String(timeLeft.hours).padStart(2, '0')}:{String(timeLeft.minutes).padStart(2, '0')}:{String(timeLeft.seconds).padStart(2, '0')}
                        </span>
                    </div>

                    {/* Navigation */}
                    <nav className="fixed top-12 left-0 w-full z-40">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="glass-effect rounded-2xl py-4 px-6 flex justify-between items-center">
                                <div className="text-2xl font-black tracking-tighter text-red-500 flex items-center gap-1">
                                    ONEPLUS <span className="text-white">NORD</span>
                                </div>
                                <div className="hidden md:flex items-center gap-8 text-sm font-bold uppercase tracking-widest text-slate-400">
                                    <a href="#features" className="hover:text-red-500 transition-colors">Sound</a>
                                    <a href="#benefits" className="hover:text-red-500 transition-colors">Specs</a>
                                    <a href="#faq" className="hover:text-red-500 transition-colors">Support</a>
                                </div>
                                <a href={amazonLink} className="flex items-center gap-2 bg-red-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-red-500 transition-all hover:scale-105">
                                    Buy Now <Icon name="shopping-cart" className="w-4 h-4" />
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-48 pb-32 px-6">
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-red-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>

                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
                            <div className="z-10 text-center lg:text-left">
                                <div className="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-xs font-bold mb-8 uppercase tracking-[0.2em] text-red-500">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                    </span>
                                    Nord Buds 3r • Limited Edition
                                </div>
                                <h1 className="text-6xl md:text-8xl font-black leading-[0.9] mb-8 text-white tracking-tighter">
                                    Bolder Sound. <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-red-400 to-white">Longer Play.</span>
                                </h1>
                                <p className="text-xl text-slate-400 mb-10 max-w-xl mx-auto lg:mx-0 leading-relaxed font-medium">
                                    Elevate your audio with 54-hour battery life and 12.4mm deep-bass drivers. The ultimate soundtrack for your hustle.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-6 justify-center lg:justify-start">
                                    <a href={amazonLink} className="bg-red-600 text-white text-xl font-bold px-10 py-5 rounded-2xl shadow-[0_0_40px_-10px_rgba(220,38,38,0.5)] hover:bg-red-500 hover:-translate-y-1 transition-all flex items-center justify-center gap-3 group">
                                        Grab at ₹1,599 <Icon name="arrow-right" className="w-6 h-6 group-hover:translate-x-1 transition-transform" />
                                    </a>
                                    <div className="flex items-center justify-center gap-3 bg-white/5 border border-white/10 px-6 py-4 rounded-2xl backdrop-blur-md">
                                        <div className="flex -space-x-3">
                                            {[1,2,3,4].map(i => (
                                                <img key={i} src={`https://i.pravatar.cc/100?u=${i+10}`} className="w-10 h-10 rounded-full border-2 border-slate-900" alt="user" />
                                            ))}
                                        </div>
                                        <div className="text-left">
                                            <div className="text-white font-bold text-sm">41,000+ Reviews</div>
                                            <div className="text-slate-500 text-xs">Trusted Excellence</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative group perspective-1000">
                                <div className="absolute inset-0 bg-red-500/5 rounded-full blur-[100px] group-hover:bg-red-500/20 transition-all duration-700"></div>
                                <div className="glass-effect relative rounded-[3rem] p-4 p-8 md:p-12 transition-all duration-700 group-hover:rotate-y-12 group-hover:-translate-y-4">
                                    <div className="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent rounded-[3rem] pointer-events-none"></div>
                                    <img 
                                        src="https://m.media-amazon.com/images/I/31UrMxaUxbL._SY300_SX300_QL70_ML2_.jpg" 
                                        alt="OnePlus Nord Buds 3r" 
                                        className="w-full h-auto object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)] filter brightness-110"
                                    />
                                </div>
                                <div className="absolute -bottom-6 -right-6 md:right-12 bg-red-600 text-white p-6 rounded-3xl shadow-2xl animate-bounce-slow font-black text-center border-4 border-slate-950">
                                    <div className="text-xs uppercase opacity-80">Only</div>
                                    <div className="text-3xl tracking-tighter">₹1,599</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Marquee */}
                    <section className="py-12 border-y border-white/5 bg-white/2 overflow-hidden">
                        <div className="flex whitespace-nowrap gap-12 animate-marquee">
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className="flex items-center gap-4 text-slate-500 text-lg font-black italic tracking-widest uppercase shrink-0">
                                    <Icon name="zap" className="w-5 h-5" color="#ef4444" /> 54H Playback
                                    <Icon name="layers" className="w-5 h-5 ml-8" color="#ef4444" /> Titanium Drivers
                                    <Icon name="shield-check" className="w-5 h-5 ml-8" color="#ef4444" /> IP55 Water Resistant
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Features */}
                    <section id="features" className="py-32 space-y-40">
                        {features.map((f, i) => (
                            <div key={i} className={`max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-20 items-center ${i % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}>
                                <div className={`z-10 ${i % 2 !== 0 ? 'md:order-2' : ''}`}>
                                    <div className="w-16 h-16 bg-red-600/10 border border-red-500/20 rounded-2xl flex items-center justify-center mb-8 shadow-[0_0_20px_rgba(239,68,68,0.1)]">
                                        <Icon name={f.icon} className="w-8 h-8" color="#ef4444" />
                                    </div>
                                    <h2 className="text-5xl font-black mb-8 leading-[1.1] text-white tracking-tight">{f.title}</h2>
                                    <p className="text-lg text-slate-400 leading-relaxed mb-10 font-medium">{f.description}</p>
                                    <ul className="space-y-6">
                                        <li className="flex items-center gap-4 group">
                                            <div className="bg-green-500/10 p-1.5 rounded-full border border-green-500/20 group-hover:bg-green-500/20 transition-all">
                                                <Icon name="check-circle-2" className="w-5 h-5" color="#22c55e" />
                                            </div>
                                            <span className="text-slate-300 font-bold tracking-tight">2-mic AI Clear Calls System</span>
                                        </li>
                                    </ul>
                                </div>
                                <div className={`${i % 2 !== 0 ? 'md:order-1' : ''} relative`}>
                                    <div className="glass-effect rounded-[2.5rem] overflow-hidden group p-2 transition-transform duration-700 hover:scale-[1.02]">
                                        <img src={f.img} alt={f.title} className="w-full h-[500px] object-cover rounded-[2rem] filter grayscale-[30%] group-hover:grayscale-0 transition-all" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </section>

                    {/* Benefits Grid */}
                    <section id="benefits" className="py-32 relative">
                        <div className="absolute inset-0 bg-red-500/[0.02] pointer-events-none"></div>
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-20">
                                <h2 className="text-5xl font-black mb-6 text-white tracking-tight">Engineered for Extremes.</h2>
                                <p className="text-slate-400 max-w-2xl mx-auto text-lg">Flagship-grade experience without the flagship price.</p>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {gridFeatures.map((gf, i) => (
                                    <div key={i} className="glass-effect p-10 rounded-[2.5rem] hover:bg-white/10 hover:border-white/20 transition-all duration-500 group">
                                        <div className="w-14 h-14 bg-red-600 text-white rounded-2xl flex items-center justify-center mb-8 shadow-[0_10px_30px_rgba(220,38,38,0.3)] group-hover:scale-110 transition-transform">
                                            <Icon name={gf.icon} className="w-7 h-7" />
                                        </div>
                                        <h3 className="text-2xl font-black mb-4 text-white uppercase tracking-tight">{gf.title}</h3>
                                        <p className="text-slate-400 leading-relaxed font-medium">{gf.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Testimonials */}
                    <section className="py-32 bg-[#080808]">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-20 text-white">
                                <div className="flex justify-center gap-1 mb-6 text-red-500">
                                    {[1,2,3,4,5].map(s => <Icon key={s} name="star" className="w-6 h-6 fill-red-500" />)}
                                </div>
                                <h2 className="text-5xl font-black mb-4 tracking-tight italic">The Verdict is In.</h2>
                                <p className="text-slate-400">Join the thousands who switched to OnePlus Audio.</p>
                            </div>
                            <div className="grid md:grid-cols-3 gap-10">
                                {testimonials.map((t, i) => (
                                    <div key={i} className="glass-effect p-10 rounded-[3rem] relative">
                                        <p className="text-xl text-slate-200 font-medium mb-10 leading-relaxed">"{t.text}"</p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center font-black text-white text-lg">
                                                {t.name[0]}
                                            </div>
                                            <div>
                                                <div className="font-black text-white uppercase tracking-wider">{t.name}</div>
                                                <div className="text-red-500 text-xs font-bold uppercase tracking-widest">Verified Buyer</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* FAQ */}
                    <section id="faq" className="py-32 px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="glass-effect rounded-[3rem] p-8 md:p-16">
                                <h2 className="text-4xl font-black mb-12 text-center text-white tracking-tight">Common Questions</h2>
                                <div className="space-y-4">
                                    {faqs.map((faq, i) => (
                                        <div key={i} className="bg-white/2 border border-white/5 rounded-2xl transition-all">
                                            <button 
                                                onClick={() => setActiveFaq(activeFaq === i ? null : i)}
                                                className="w-full p-6 text-left flex justify-between items-center hover:bg-white/5 transition-colors rounded-2xl group"
                                            >
                                                <span className="font-bold text-lg text-slate-200 group-hover:text-white">{faq.q}</span>
                                                <Icon name="chevron-down" className={`w-5 h-5 text-red-500 transition-transform ${activeFaq === i ? 'rotate-180' : ''}`} />
                                            </button>
                                            {activeFaq === i && (
                                                <div className="px-6 pb-8 text-slate-400 font-medium leading-relaxed">
                                                    {faq.a}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer CTA */}
                    <footer className="bg-black py-32 px-6 relative border-t border-white/5">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_bottom,_var(--tw-gradient-stops))] from-red-600/10 via-transparent to-transparent opacity-50"></div>
                        <div className="max-w-5xl mx-auto text-center relative z-10">
                            <div className="inline-block bg-red-600/10 border border-red-500/30 text-red-500 px-6 py-2 rounded-full text-sm font-black mb-12 uppercase tracking-[0.3em]">
                                Limited Time Launch Deal
                            </div>
                            <h2 className="text-6xl md:text-8xl font-black text-white mb-10 tracking-tighter uppercase italic">
                                Don't Just Listen. <br />
                                <span className="text-red-500">Feel Every Beat.</span>
                            </h2>
                            <div className="flex flex-col items-center gap-8">
                                <a href={amazonLink} className="w-full md:w-auto bg-white text-black text-3xl font-black px-16 py-8 rounded-[2rem] hover:bg-red-600 hover:text-white transition-all hover:scale-105 shadow-[0_20px_60px_-15px_rgba(255,255,255,0.2)]">
                                    ORDER NOW ON AMAZON
                                </a>
                                <div className="flex items-center gap-4 text-red-500 font-mono text-xl animate-pulse">
                                    <Icon name="clock" className="w-6 h-6" /> ENDS SOON: {String(timeLeft.hours).padStart(2, '0')}:{String(timeLeft.minutes).padStart(2, '0')}
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
